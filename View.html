<html>
<head>
	<title>Front Panel</title>

  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: "Panel";
      font-style: normal;
      font-weight: normal;
      src: url(fonts/Arimo.ttf);
    }

    @font-face {
      font-family: "Panel";
      font-style: normal;
      font-weight: bold;
      src: url(fonts/Arimo.ttf);
    }

    @font-face {
      font-family: "Panel";
      font-style: italic;
      font-weight: normal;
      src: url(fonts/Arimo-Italic.ttf);
    }

    @font-face {
      font-family: "Panel";
      font-style: italic;
      font-weight: bold;
      src: url(fonts/Arimo-Italic.ttf);
    }

    svg {
      /* the entirety of the SVG should be unselectable. */
      -webkit-user-select: none; /* Safari */
      user-select: none;
    }

    /* Buttons allow panning and zooming */
    .button {
      touch-action: none;
    }

    /* sliders allow panning horizontally but not vertically, and pinch zooming */
    .slider {
      touch-action: none;
    }

    /* keys on the keyboard need to handle it all themselves. Pan and zoom elsewhere. */
    .keyboard {
      touch-action: none;
    }

    .panel_type {
      margin-bottom: 5px;
    }
  </style>
</head>
<body onload="prepare();" bgcolor="#111" class="notranslate">
  <div class="panel_type"><select id="panel_type"></select></div>
  <div id="container" width="100%" height="100%"></div>

  <div width="0" height="0"><canvas id="measure" width="0" height="0"></canvas></div>
</body>

<script language="javascript" src="View.js"></script>
<script language="javascript">

var connector = null;

function wsroot() {
  var l = window.location.href;
  return (l.startsWith("https") ? "wss" : "ws") + l.substring(l.indexOf(':'), l.lastIndexOf('/')) + "/socket";
}

function changePanelType(e) {
  console.log("Changing panel type: ");
  console.log(e);
  connector.selectView(e.target.value);
}

function prepare() {
  panelTypeSelect = document.getElementById("panel_type");
  panelTypeSelect.onchange = changePanelType;

  console.log("Creating Connector");
  connector = new Connector(wsroot(), '$keyboard$', '$version$');
  console.log("Have Connector, poulating view options");
  connector.populateViewOptions(panelTypeSelect);

  console.log("Selecting view at index 0");
  connector.selectView(0);
  container.appendChild(connector.root);
  connector.showMessage("Connecting to server...");
}

</script>

</html>
